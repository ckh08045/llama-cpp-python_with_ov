name: Build llama-cpp-python (Linux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest   # Ubuntu 24.04 (Noble) - compatible with Linux Mint 22

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (OpenBLAS + Vulkan)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libopenblas-dev \
          libvulkan-dev \
          vulkan-validationlayers \
          vulkan-utility-libraries-dev \
          pkg-config \
          build-essential

    - name: Install Vulkan SDK (optional but recommended for full/consistent headers & tools)
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        vulkan_version: '1.3.296.0'   # or latest stable like '1.3.290.0' / '1.4.x' if needed
        cache: true

    - name: Install Python build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools scikit-build-core cmake ninja

    - name: Clone llama-cpp-python
      run: |
        git clone --recursive https://github.com/abetlen/llama-cpp-python.git
        cd llama-cpp-python
        git submodule update --init --recursive
        # Optional: Force llama.cpp to latest main (ggml-org)
        # cd vendor/llama.cpp
        # git remote set-url origin https://github.com/ggml-org/llama.cpp.git
        # git fetch origin
        # git checkout master
        # cd ../..

    - name: Build Python Wheel (Vulkan + OpenBLAS)
      run: |
        cd llama-cpp-python
        export GGML_VULKAN=ON
        export GGML_BLAS=ON
        export GGML_BLAS_VENDOR=OpenBLAS
        export CMAKE_ARGS="-DGGML_VULKAN=ON -DGGML_BLAS=ON -DGGML_BLAS_VENDOR=OpenBLAS"
        export FORCE_CMAKE=1
        python -m build --wheel

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: llama-cpp-python-wheel-linux
        path: llama-cpp-python/dist/*.whl
