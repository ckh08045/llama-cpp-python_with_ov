name: Build llama-cpp-python (Windows, Vulkan+Static OpenBLAS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # ── 1. 리포 체크아웃 ───────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Python 3.11 세팅 ────────────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ── 3. Vulkan SDK ──────────────────────────────────────────────────────
    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        vulkan_version: '1.4.304.1'
        cache: true

    # ── 4. OpenBLAS (정적 링크용 vcpkg) ────────────────────────────────────
    # 핵심 포인트: x64-windows-static을 사용하여 openblas.dll이 따로 필요 없게 만듭니다.
    - name: Install OpenBLAS via vcpkg (STATIC)
      run: |
        vcpkg install openblas:x64-windows-static
        vcpkg integrate install

    # ── 4.5. pkg-config 설치 ───────────────────────────────────────────────
    - name: Install pkg-config
      run: choco install pkgconfiglite --yes

    # ── 5. Python 빌드 도구 ────────────────────────────────────────────────
    - name: Install Python build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools scikit-build-core cmake ninja

    # ── 6. 공식 llama-cpp-python 최신 버전 클론 (Qwen3.5 지원 필수) ────────
    - name: Clone official llama-cpp-python
      run: |
        git clone --recursive https://github.com/abetlen/llama-cpp-python.git
        cd llama-cpp-python
        # 서브모듈(llama.cpp)을 현재 llama-cpp-python 버전에 맞게 초기화
        git submodule update --init --recursive vendor/llama.cpp

    # ── 7. 휠 빌드 (GGML 옵션 + Static VCPKG) ──────────────────────────────
    - name: Build Python Wheel
      run: |
        cd llama-cpp-python

        # Vulkan 경로 슬래시 치환
        $vulkanSdk = $env:VULKAN_SDK
        if (-not $vulkanSdk) { $vulkanSdk = "C:/VulkanSDK/1.4.304.1" }
        $vulkanSdk = $vulkanSdk -replace '\\', '/'
        
        # vcpkg 정적 라이브러리 경로 명시
        $vcpkgRelease = "C:/vcpkg/installed/x64-windows-static"

        # Qwen3.5 지원 최신 llama.cpp는 반드시 GGML_ 접두사를 사용해야 합니다.
        $env:CMAKE_ARGS = @(
          "-DGGML_VULKAN=ON",
          "-DGGML_BLAS=ON",
          "-DGGML_BLAS_VENDOR=OpenBLAS",
          "-DGGML_NATIVE=OFF",
          "-DLLAMA_CURL=OFF",
          "-DVCPKG_TARGET_TRIPLET=x64-windows-static",
          "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
          "-DCMAKE_PREFIX_PATH=$vcpkgRelease",
          "-DVulkan_LIBRARY=$vulkanSdk/Lib/vulkan-1.lib",
          "-DVulkan_INCLUDE_DIR=$vulkanSdk/Include"
        ) -join " "
        
        $env:FORCE_CMAKE = "1"
        Write-Host "CMAKE_ARGS: $env:CMAKE_ARGS"
        python -m build --wheel

    # ── 8. 빌드 결과 확인 ─────────────────────────────────────────────────
    - name: List built wheels
      run: |
        Get-ChildItem llama-cpp-python/dist/*.whl | ForEach-Object {
          Write-Host "✅ $($_.Name)  ($([math]::Round($_.Length/1MB, 1)) MB)"
        }

    # ── 9. 아티팩트 업로드 ───────────────────────────────────────────────
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: llama-cpp-python-0.3.32-vulkan-static
        path: llama-cpp-python/dist/*.whl
        retention-days: 30
