name: Build llama-cpp-python (Windows, Vulkan+OpenBLAS)

on:
  workflow_dispatch:
    inputs:
      llama_cpp_ref:
        description: 'llama.cpp branch/tag/commit (비워두면 최신 master)'
        required: false
        default: ''
      llama_cpp_python_ref:
        description: 'llama-cpp-python branch/tag (비워두면 최신 main)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest

    steps:
    # ── 1. 리포 체크아웃 ───────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Python 3.11 세팅 ────────────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ── 3. Vulkan SDK ──────────────────────────────────────────────────────
    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        vulkan_version: '1.4.304.1'   # 최신 안정 버전
        cache: true

    # ── 4. OpenBLAS (vcpkg) ────────────────────────────────────────────────
    - name: Install OpenBLAS via vcpkg
      run: |
        vcpkg install openblas:x64-windows
        vcpkg integrate install

    # ── 4.5. pkg-config 설치 (ggml-blas CMakeLists.txt가 PkgConfig 필수 요구) ──
    #   Windows GitHub Runner에 기본 미포함 → pkgconfiglite로 해결
    - name: Install pkg-config (required by ggml-blas CMake)
      run: choco install pkgconfiglite --yes

    # ── 5. Python 빌드 도구 ────────────────────────────────────────────────
    - name: Install Python build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools scikit-build-core cmake ninja

    # ── 6. 공식 llama-cpp-python 클론 (abetlen → JamePeng 포크 아님!) ──────
    #   JamePeng 포크 문제점:
    #     - create_chat_completion()에 chat_template_kwargs 파라미터 없음
    #     - presence_penalty 가 present_penalty (오타)로 되어 있음
    #     - Qwen3.x /no_think, enable_thinking 템플릿 미지원
    - name: Clone official llama-cpp-python
      run: |
        $ref = "${{ github.event.inputs.llama_cpp_python_ref }}"
        if ($ref -eq "") { $ref = "main" }
        Write-Host "llama-cpp-python ref: $ref"
        git clone --recursive https://github.com/abetlen/llama-cpp-python.git
        cd llama-cpp-python
        git checkout $ref

    # ── 7. llama.cpp 서브모듈을 지정 ref(또는 최신 master)로 업데이트 ─────
    - name: Update llama.cpp submodule
      run: |
        cd llama-cpp-python
        $ref = "${{ github.event.inputs.llama_cpp_ref }}"
        if ($ref -ne "") {
          Write-Host "llama.cpp 고정 ref: $ref"
          cd vendor/llama.cpp
          git fetch origin
          git checkout $ref
          cd ../..
        } else {
          Write-Host "llama.cpp 최신 master로 업데이트"
          git submodule update --remote vendor/llama.cpp
        }
        # 실제 llama.cpp 커밋 확인
        cd vendor/llama.cpp
        Write-Host "llama.cpp HEAD: $(git rev-parse --short HEAD)"

    # ── 8. 휠 빌드 ────────────────────────────────────────────────────────
    #   CMake 옵션 설명:
    #     GGML_VULKAN=ON           : Vulkan GPU 오프로드 (AMD/Intel/NVIDIA)
    #     GGML_BLAS=ON             : CPU 선형대수 가속 (OpenBLAS)
    #     GGML_BLAS_VENDOR=OpenBLAS
    #     GGML_NATIVE=OFF          : 배포 범용성 (AVX2 고정 X)
    #     LLAMA_CURL=OFF           : Windows에서 curl 의존 빌드 오류 방지
    #     CMAKE_TOOLCHAIN_FILE     : vcpkg OpenBLAS 경로 자동 연결
    #     CMAKE_PREFIX_PATH        : release lib 명시 (debug lib 선택 방지)
    - name: Build Python Wheel
      run: |
        cd llama-cpp-python

        # Vulkan SDK 환경변수 (jakoch 액션이 설정했지만 명시적 보강)
        $vulkanSdk = $env:VULKAN_SDK
        if (-not $vulkanSdk) {
          $vulkanSdk = "C:/VulkanSDK/1.4.304.1"
        }
        Write-Host "Vulkan SDK: $vulkanSdk"

        # vcpkg release 경로 명시 (debug/lib 대신 release lib 선택)
        $vcpkgRelease = "C:/vcpkg/installed/x64-windows"

        $env:CMAKE_ARGS = @(
          "-DGGML_VULKAN=ON",
          "-DGGML_BLAS=ON",
          "-DGGML_BLAS_VENDOR=OpenBLAS",
          "-DGGML_NATIVE=OFF",
          "-DLLAMA_CURL=OFF",
          "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
          "-DCMAKE_PREFIX_PATH=$vcpkgRelease",
          "-DVulkan_LIBRARY=$vulkanSdk/Lib/vulkan-1.lib",
          "-DVulkan_INCLUDE_DIR=$vulkanSdk/Include"
        ) -join " "
        $env:FORCE_CMAKE = "1"
        Write-Host "CMAKE_ARGS: $env:CMAKE_ARGS"
        python -m build --wheel

    # ── 9. 빌드 결과 확인 ─────────────────────────────────────────────────
    - name: List built wheels
      run: |
        Get-ChildItem llama-cpp-python/dist/*.whl | ForEach-Object {
          Write-Host "✅ $($_.Name)  ($([math]::Round($_.Length/1MB, 1)) MB)"
        }

    # ── 10. 아티팩트 업로드 ───────────────────────────────────────────────
    - name: Upload Wheel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: llama-cpp-python-win-vulkan-openblas-cp311
        path: llama-cpp-python/dist/*.whl
        retention-days: 30
